<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>practice scripts</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">

    <!-- ═══ Auth Page ═══ -->
    <div id="auth-page" class="page">
      <div class="auth-container">
        <div class="auth-card">
          <h1 class="auth-title">practice scripts</h1>
          <p class="auth-subtitle">Learn to read scripts by typing place names</p>

          <div class="auth-tabs">
            <button type="button" class="auth-tab active" data-tab="login">Log in</button>
            <button type="button" class="auth-tab" data-tab="register">Register</button>
          </div>

          <!-- Login form -->
          <form id="login-form" class="auth-form">
            <div id="login-error" class="auth-error"></div>
            <label class="auth-label">Email</label>
            <input type="email" id="login-email" class="auth-input" placeholder="your@email.com" required>
            <label class="auth-label">Password</label>
            <input type="password" id="login-password" class="auth-input" placeholder="Password" required>
            <button type="submit" class="auth-submit">Log in</button>
          </form>

          <!-- Register form -->
          <form id="register-form" class="auth-form" style="display:none">
            <div id="register-error" class="auth-error"></div>
            <label class="auth-label">Username</label>
            <input type="text" id="register-username" class="auth-input" placeholder="Choose a username" required>
            <label class="auth-label">Email</label>
            <input type="email" id="register-email" class="auth-input" placeholder="your@email.com" required>
            <label class="auth-label">Password <span class="auth-hint">(8+ chars, 1 uppercase, 1 number)</span></label>
            <input type="password" id="register-password" class="auth-input" placeholder="Password" required>
            <button type="submit" class="auth-submit">Register</button>
          </form>

          <div class="auth-divider"><span>or</span></div>

          <button type="button" id="auth-google-btn" class="auth-google-btn">
            <svg viewBox="0 0 24 24" width="20" height="20"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Continue with Google
          </button>
        </div>
      </div>
    </div>

    <!-- ═══ Username Prompt ═══ -->
    <div id="username-prompt-page" class="page" style="display:none">
      <div class="auth-container">
        <div class="auth-card">
          <h1 class="auth-title">Welcome!</h1>
          <p class="auth-subtitle">Choose a username to get started</p>
          <div class="auth-form">
            <div id="username-prompt-error" class="auth-error"></div>
            <label class="auth-label">Username</label>
            <input type="text" id="username-prompt-input" class="auth-input" placeholder="Username" autocomplete="off">
            <p class="auth-hint" style="font-size:0.78rem">Only letters, numbers, and underscores. At least 4 characters.</p>
            <button type="button" id="username-prompt-submit" class="auth-submit">Continue</button>
          </div>
          <button type="button" id="username-prompt-signout" class="auth-google-btn" style="margin-top:1rem">Sign out</button>
        </div>
      </div>
    </div>

    <!-- ═══ Practice Page ═══ -->
    <div id="practice-page" class="page" style="display:none">
      <header>
        <div class="header-left">
          <button type="button" id="profile-btn" class="header-icon-btn" title="Profile">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </button>
        </div>
        <div class="header-center"></div>
        <div class="header-right">
          <div class="select-wrapper">
            <select id="language-select"></select>
          </div>
        </div>
      </header>

      <main>
        <div class="card">
          <div id="status"></div>

          <div id="display-area">
            <div id="script-display"></div>
            <div id="hint"></div>
          </div>

          <form id="answer-form">
            <input type="text" id="answer-input" placeholder="Type the latin name..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
            <button type="button" id="giveup-btn">Give up</button>
          </form>

          <div id="feedback"></div>
          <button type="button" id="report-btn" class="report-btn" style="display:none">Report</button>
        </div>

        <p id="disclaimer">Transliterations may differ slightly from those shown on Google Maps.</p>
      </main>
    </div>

    <!-- ═══ Overlay ═══ -->
    <div id="overlay" class="overlay" style="display:none"></div>

    <!-- ═══ Profile Sidebar ═══ -->
    <div id="profile-sidebar" class="sidebar">
      <div class="sidebar-header">
        <h2>Profile</h2>
        <button type="button" id="profile-close-btn" class="sidebar-close-btn">&times;</button>
      </div>
      <div class="sidebar-body">
        <div id="profile-content">
          <div class="profile-avatar" id="profile-avatar"></div>
          <div class="profile-section">
            <label class="profile-label">Username</label>
            <div class="profile-row">
              <input type="text" id="profile-username-input" class="auth-input" disabled>
              <button type="button" id="profile-username-edit-btn" class="profile-edit-btn">Edit</button>
            </div>
            <p id="profile-username-status" class="profile-status"></p>
          </div>
          <div class="profile-section">
            <label class="profile-label">Email</label>
            <div class="profile-row">
              <input type="email" id="profile-email-input" class="auth-input" disabled>
              <button type="button" id="profile-email-edit-btn" class="profile-edit-btn">Change</button>
            </div>
          </div>
          <div class="profile-section">
            <label class="profile-label">Password</label>
            <button type="button" id="profile-password-btn" class="auth-submit" style="width:auto;padding:0.5rem 1rem">Change password</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ═══ Report Sidebar ═══ -->
    <div id="report-sidebar" class="sidebar">
      <div class="sidebar-header">
        <h2>Report transliteration</h2>
        <button type="button" id="report-close-btn" class="sidebar-close-btn">&times;</button>
      </div>
      <div class="sidebar-body">
        <div id="report-content">
          <div class="report-field">
            <label class="profile-label">Word in native script</label>
            <div id="report-native" class="report-value"></div>
          </div>
          <div class="report-field">
            <label class="profile-label">Current transliteration</label>
            <div id="report-old-latin" class="report-value"></div>
          </div>
          <div class="report-field">
            <label class="profile-label">Suggested transliteration <span class="auth-hint">(optional)</span></label>
            <input type="text" id="report-suggestion" class="auth-input" placeholder="Your suggested transliteration...">
          </div>
          <div id="report-error" class="auth-error"></div>
          <button type="button" id="report-submit-btn" class="auth-submit">Submit report</button>
        </div>
      </div>
    </div>

  </div>

  <div id="theme-toggle" class="theme-toggle" role="button" tabindex="0" aria-label="Toggle theme">
    <span class="tt-icon tt-sun">
      <svg class="tt-svg" viewBox="0 0 24 24" width="18" height="18">
        <defs>
          <radialGradient id="sunGrad" cx="35%" cy="35%">
            <stop offset="0%" stop-color="#fff5b0"/>
            <stop offset="40%" stop-color="#f9d71c"/>
            <stop offset="100%" stop-color="#e67e22"/>
          </radialGradient>
        </defs>
        <circle cx="12" cy="12" r="4.5" fill="url(#sunGrad)"/>
        <g stroke="url(#sunGrad)" stroke-width="1.8" stroke-linecap="round">
          <line x1="12" y1="2" x2="12" y2="4.5"/>
          <line x1="12" y1="19.5" x2="12" y2="22"/>
          <line x1="2" y1="12" x2="4.5" y2="12"/>
          <line x1="19.5" y1="12" x2="22" y2="12"/>
          <line x1="4.93" y1="4.93" x2="6.7" y2="6.7"/>
          <line x1="17.3" y1="17.3" x2="19.07" y2="19.07"/>
          <line x1="4.93" y1="19.07" x2="6.7" y2="17.3"/>
          <line x1="17.3" y1="6.7" x2="19.07" y2="4.93"/>
        </g>
      </svg>
    </span>
    <div class="tt-track">
      <span class="tt-thumb"></span>
    </div>
    <span class="tt-icon tt-moon">
      <svg class="tt-svg" viewBox="0 0 24 24" width="18" height="18">
        <defs>
          <radialGradient id="moonGrad" cx="35%" cy="35%">
            <stop offset="0%" stop-color="#e8f0fe"/>
            <stop offset="60%" stop-color="#a0b8d4"/>
            <stop offset="100%" stop-color="#5a7a9a"/>
          </radialGradient>
        </defs>
        <circle cx="12" cy="12" r="9" fill="url(#moonGrad)"/>
        <circle cx="15" cy="10" r="7" fill="var(--surface)"/>
      </svg>
    </span>
  </div>

  <script type="module" src="firebase.js"></script>
  <script type="module" src="translit.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
