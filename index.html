<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>practice scripts</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header>
      <div class="header-left">
        <h1>practice scripts</h1>
      </div>
      <div class="header-right">
        <div class="select-wrapper">
          <select id="language-select"></select>
        </div>
      </div>
    </header>

    <main>
      <div id="status"></div>

      <div id="display-area">
        <div id="script-display"></div>
        <div id="hint"></div>
      </div>

      <form id="answer-form">
        <input type="text" id="answer-input" placeholder="Type the latin name..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        <button type="button" id="giveup-btn">Give up</button>
      </form>

      <div id="feedback"></div>

      <p id="disclaimer">Transliterations may differ slightly from those shown on Google Maps.</p>
    </main>
  </div>

  <div id="theme-toggle" class="theme-toggle" role="button" tabindex="0" aria-label="Toggle theme">
    <span class="tt-icon tt-sun">
      <svg class="tt-svg" viewBox="0 0 24 24" width="18" height="18">
        <defs>
          <radialGradient id="sunGrad" cx="35%" cy="35%">
            <stop offset="0%" stop-color="#fff5b0"/>
            <stop offset="40%" stop-color="#f9d71c"/>
            <stop offset="100%" stop-color="#e67e22"/>
          </radialGradient>
        </defs>
        <circle cx="12" cy="12" r="4.5" fill="url(#sunGrad)"/>
        <g stroke="url(#sunGrad)" stroke-width="1.8" stroke-linecap="round">
          <line x1="12" y1="2" x2="12" y2="4.5"/>
          <line x1="12" y1="19.5" x2="12" y2="22"/>
          <line x1="2" y1="12" x2="4.5" y2="12"/>
          <line x1="19.5" y1="12" x2="22" y2="12"/>
          <line x1="4.93" y1="4.93" x2="6.7" y2="6.7"/>
          <line x1="17.3" y1="17.3" x2="19.07" y2="19.07"/>
          <line x1="4.93" y1="19.07" x2="6.7" y2="17.3"/>
          <line x1="17.3" y1="6.7" x2="19.07" y2="4.93"/>
        </g>
      </svg>
    </span>
    <div class="tt-track">
      <span class="tt-thumb"></span>
    </div>
    <span class="tt-icon tt-moon">
      <svg class="tt-svg" viewBox="0 0 24 24" width="18" height="18">
        <defs>
          <radialGradient id="moonGrad" cx="35%" cy="35%">
            <stop offset="0%" stop-color="#e8f0fe"/>
            <stop offset="60%" stop-color="#a0b8d4"/>
            <stop offset="100%" stop-color="#5a7a9a"/>
          </radialGradient>
        </defs>
        <circle cx="12" cy="12" r="9" fill="url(#moonGrad)"/>
        <circle cx="15" cy="10" r="7" fill="var(--surface)"/>
      </svg>
    </span>
  </div>

  <script src="app.js"></script>
</body>
</html>
